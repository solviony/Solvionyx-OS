name: Build All Editions
on:
  schedule:
    - cron: "0 3 * * *"
  push:
    tags: ["v*"]
jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        edition: [gnome, xfce, kde]
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y debootstrap grub-pc-bin grub-efi-amd64-bin syslinux isolinux syslinux-utils mtools xorriso squashfs-tools rsync systemd-container genisoimage dosfstools xz-utils jq curl plymouth plymouth-themes plymouth-label imagemagick
      - uses: google-github-actions/auth@v2
        with: { credentials_json: '${{ secrets.GCS_CREDENTIALS_JSON }}' }
      - uses: google-github-actions/setup-gcloud@v2
        with: { project_id: iconic-biplane-476304-u8, install_components: 'gsutil' }
      - run: chmod +x build_iso_debian.sh && ./build_iso_debian.sh "${{ matrix.edition }}"
      - run: gsutil cp solvionyx_build/*.iso.xz gs://solvionyx-os/aurora/${{ matrix.edition }}/
      - uses: softprops/action-gh-release@v1
        with: { files: "solvionyx_build/*.iso.xz" }
