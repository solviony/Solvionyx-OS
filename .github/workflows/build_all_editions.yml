name: Build & Release Solvionyx OS — Aurora (GNOME/XFCE/KDE)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: 🧠 Solvionyx OS — Aurora (${{ matrix.edition }})
    runs-on: ubuntu-24.04
    timeout-minutes: 150

    strategy:
      matrix:
        edition: [gnome, xfce, kde]
      fail-fast: false

    env:
      # 🌌 Global branding (no scattered hardcoding)
      OS_NAME: "Solvionyx OS"
      OS_FLAVOR: "Aurora"
      TAGLINE: "The Engine Behind the Vision."
      OS_USER: "solvionyx"

      GCS_BUCKET: solvionyx-os
      GCP_PROJECT: iconic-biplane-476304-u8
      VERSION: v${{ github.run_number }}
      ISO_DIR: solvionyx_build

      # Branding assets (you can replace these files in repo)
      BRAND_LOGO_COLOR: branding/logo-color.png
      BRAND_LOGO_WHITE: branding/logo-white.png
      BRAND_LOGO_BLACK: branding/logo-black.png
      BRAND_BG: branding/aurora-bg.png

    steps:
      # ---------------------------------------------------
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      - name: ⚙️ Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap grub-pc-bin grub-efi-amd64-bin grub-common \
            syslinux isolinux syslinux-utils mtools xorriso squashfs-tools \
            rsync systemd-container genisoimage dosfstools xz-utils jq curl unzip \
            plymouth plymouth-themes plymouth-label imagemagick

      # ---------------------------------------------------
      - name: 🔐 Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_CREDENTIALS_JSON }}

      - name: ☁️ Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}
          install_components: 'gsutil'

      - name: 🔎 Verify GCS Access
        run: |
          gsutil ls "gs://${GCS_BUCKET}" || (echo "❌ Cannot access bucket!" && exit 1)
          echo "✅ GCS bucket is reachable."

      # ---------------------------------------------------
      - name: 🎨 Ensure branding assets
        run: |
          mkdir -p branding

          # If old assets exist, copy them into new names for compatibility
          if [ -f branding/4023.png ] && [ ! -f "${BRAND_LOGO_COLOR}" ]; then
            cp branding/4023.png "${BRAND_LOGO_COLOR}"
          fi
          if [ -f branding/4022.jpg ] && [ ! -f "${BRAND_BG}" ]; then
            cp branding/4022.jpg "${BRAND_BG}"
          fi

          # Fallback color logo
          if [ ! -f "${BRAND_LOGO_COLOR}" ]; then
            echo "⚠️ ${BRAND_LOGO_COLOR} missing — creating fallback color logo..."
            convert -size 1024x256 xc:black \
              -gravity center -fill '#00A3FF' -pointsize 80 \
              -annotate +0-30 'SOLVIONYX' \
              -fill '#FF00C8' -pointsize 80 \
              -annotate +260-30 'OS' "${BRAND_LOGO_COLOR}"
          fi

          # Fallback white logo
          if [ ! -f "${BRAND_LOGO_WHITE}" ]; then
            echo "⚠️ ${BRAND_LOGO_WHITE} missing — creating fallback white logo..."
            convert "${BRAND_LOGO_COLOR}" -fill white -colorize 100 "${BRAND_LOGO_WHITE}"
          fi

          # Fallback black logo
          if [ ! -f "${BRAND_LOGO_BLACK}" ]; then
            echo "⚠️ ${BRAND_LOGO_BLACK} missing — creating fallback black logo..."
            convert "${BRAND_LOGO_COLOR}" -fill black -colorize 100 "${BRAND_LOGO_BLACK}"
          fi

          # Fallback background (generated theme)
          if [ ! -f "${BRAND_BG}" ]; then
            echo "ℹ️ ${BRAND_BG} missing — generating Aurora gradient background..."
            convert -size 2560x1440 \
              gradient:'#050816-#041E4F' \
              \( -size 2560x1440 radial-gradient:#0B68FF00-#FF00C820 \) -compose screen -composite \
              "${BRAND_BG}"
          fi

      # ---------------------------------------------------
      - name: 💿 Build Solvionyx OS ISO (${{ matrix.edition }})
        run: |
          chmod +x build_iso_debian.sh
          export SOLVIONYX_LOGO_PATH="${BRAND_LOGO_COLOR}"
          export SOLVIONYX_BG_PATH="${BRAND_BG}"
          export OS_NAME="${OS_NAME}"
          export OS_FLAVOR="${OS_FLAVOR}"
          export TAGLINE="${TAGLINE}"
          export OS_USER="${OS_USER}"
          ./build_iso_debian.sh "${{ matrix.edition }}"

      # ---------------------------------------------------
      - name: 📦 Ensure installer present
        run: |
          set -euo pipefail
          CHROOT_DIR=solvionyx_build/chroot

          # All editions use Calamares (no Ubiquity)
          echo "⚙️ Ensuring Calamares installer for edition ${{ matrix.edition }}..."
          sudo chroot "$CHROOT_DIR" bash -lc '
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get install -y -qq calamares calamares-settings-debian
          '
          echo "✅ Calamares installer present."

      # ---------------------------------------------------
      - name: ✨ Inject GTK "Welcome to Solvionyx OS" App (Dynamic)
        shell: bash
        env:
          CHROOT_DIR: solvionyx_build/chroot
        run: |
          set -euo pipefail
          echo "🚀 Adding dynamic GTK Welcome App..."

          sudo install -d -m 755 "$CHROOT_DIR/usr/share/solvionyx"
          sudo install -d -m 755 "$CHROOT_DIR/etc/xdg/autostart"

          # Launcher script (no OS name hardcoding; reads /etc/os-release)
          sudo tee "$CHROOT_DIR/usr/share/solvionyx/welcome-solvionyx.sh" >/dev/null <<'EOSH'
          #!/usr/bin/env bash
          FLAG_FILE="$HOME/.config/.welcome_shown"
          if [ -f "$FLAG_FILE" ]; then
            exit 0
          fi
          mkdir -p "$(dirname "$FLAG_FILE")"
          touch "$FLAG_FILE"

          python3 - <<'PY'
          import gi, subprocess, webbrowser, os, shlex
          gi.require_version('Gtk', '3.0')
          from gi.repository import Gtk

          # Read branding from /etc/os-release so there's no hardcoded name
          os_name = "Solvionyx OS"
          os_flavor = "Aurora"
          tagline = "The Engine Behind the Vision."

          try:
              data = {}
              with open("/etc/os-release") as f:
                  for line in f:
                      line = line.strip()
                      if not line or line.startswith("#") or "=" not in line:
                          continue
                      k, v = line.split("=", 1)
                      data[k] = v.strip().strip('"')
              os_name = data.get("SOLVIONYX_NAME", data.get("NAME", os_name))
              os_flavor = data.get("SOLVIONYX_FLAVOR", os_flavor)
              tagline = data.get("SOLVIONYX_TAGLINE", tagline)
          except Exception:
              pass

          class Welcome(Gtk.Window):
              def __init__(self):
                  title_text = f"Welcome to {os_name}"
                  super().__init__(title=title_text)
                  self.set_default_size(900, 600)
                  self.set_border_width(24)

                  settings = Gtk.Settings.get_default()
                  if settings is not None:
                      settings.set_property("gtk-application-prefer-dark-theme", True)

                  box = Gtk.VBox(spacing=18)
                  self.add(box)

                  title = Gtk.Label()
                  title.set_markup(
                      f"<span size='xx-large' weight='bold'>{Gtk.utils.escape_markup(title_text)} — {Gtk.utils.escape_markup(os_flavor)}</span>"
                  )

                  subtitle = Gtk.Label()
                  subtitle.set_markup(
                      f"<span size='large' foreground='#A9A9A9'>{Gtk.utils.escape_markup(tagline)}</span>"
                  )

                  subtitle.set_justify(Gtk.Justification.CENTER)
                  subtitle.set_line_wrap(True)

                  box.pack_start(title, False, False, 6)
                  box.pack_start(subtitle, False, False, 6)

                  # Buttons row
                  b1 = Gtk.Button(label="💽 Install Now")
                  b2 = Gtk.Button(label="🧠 Try Live Environment")
                  b3 = Gtk.Button(label="🌐 Learn More")

                  b1.connect("clicked", self.install)
                  b2.connect("clicked", lambda _w: self.destroy())
                  b3.connect("clicked", lambda _w: webbrowser.open("https://solviony.com/page/os"))

                  row = Gtk.HBox(spacing=10)
                  for b in (b1, b2, b3):
                      row.pack_start(b, True, True, 0)

                  box.pack_end(row, False, False, 6)

                  # Try to set wallpaper to Solvionyx background on first run
                  try:
                      bg_path = "/usr/share/backgrounds/solvionyx-aurora.png"
                      if os.path.exists(bg_path):
                          uri = "file://" + bg_path
                          subprocess.Popen([
                              "gsettings", "set",
                              "org.gnome.desktop.background", "picture-uri", uri
                          ])
                          subprocess.Popen([
                              "gsettings", "set",
                              "org.gnome.desktop.background", "picture-uri-dark", uri
                          ])
                  except Exception:
                      pass

              def install(self, _w):
                  # Prefer Calamares (installed in all editions)
                  if subprocess.call(["which", "calamares"],
                                     stdout=subprocess.DEVNULL,
                                     stderr=subprocess.DEVNULL) == 0:
                      subprocess.Popen(["pkexec", "calamares"])
                  else:
                      # Fallback dialog if somehow missing
                      dialog = Gtk.MessageDialog(
                          transient_for=self,
                          flags=0,
                          message_type=Gtk.MessageType.INFO,
                          buttons=Gtk.ButtonsType.OK,
                          text="Installer not available",
                      )
                      dialog.format_secondary_text(
                          "Calamares is not installed in this environment.\n"
                          "You can continue exploring the live session."
                      )
                      dialog.run()
                      dialog.destroy()
                  self.destroy()

          w = Welcome()
          w.connect("destroy", Gtk.main_quit)
          w.show_all()
          Gtk.main()
          PY
          EOSH

          sudo chmod +x "$CHROOT_DIR/usr/share/solvionyx/welcome-solvionyx.sh"

          # Autostart entry
          sudo tee "$CHROOT_DIR/etc/xdg/autostart/welcome-solvionyx.desktop" >/dev/null <<'EOD'
          [Desktop Entry]
          Type=Application
          Name=Welcome to Solvionyx OS
          Comment=First-launch Welcome for Solvionyx OS
          Exec=/usr/share/solvionyx/welcome-solvionyx.sh
          X-GNOME-Autostart-enabled=true
          EOD

          echo "✅ GTK Welcome App injected dynamically."

      # ---------------------------------------------------
      - name: 🗜️ Compress ISO (idempotent safety)
        run: |
          cd "${ISO_DIR}"
          RAW_ISO=$(ls *.iso 2>/dev/null | head -n 1 || true)
          if [ -n "$RAW_ISO" ] && [ ! -f "${RAW_ISO}.xz" ]; then
            echo "🗜️ Compressing $RAW_ISO..."
            xz -T2 -5 "${RAW_ISO}"
          fi

      # ---------------------------------------------------
      - name: 🔐 Generate SHA256 Checksums
        run: |
          cd "${ISO_DIR}"
          sha256sum *.iso.xz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # ---------------------------------------------------
      - name: ☁️ Upload to Google Cloud Storage (Auto-Public)
        env:
          EDITION: ${{ matrix.edition }}
        run: |
          ISO_FILE=$(ls ${ISO_DIR}/*.iso.xz | head -n 1)
          SHA_FILE="${ISO_DIR}/SHA256SUMS.txt"
          ISO_NAME=$(basename "$ISO_FILE")
          VERSION_PATH="aurora/${VERSION}/${EDITION}"
          LATEST_PATH="aurora/latest/${EDITION}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHA256=$(sha256sum "$ISO_FILE" | awk '{print $1}')

          echo "📤 Uploading ISO and checksum..."
          gsutil -m cp -n "$ISO_FILE" "$SHA_FILE" "gs://${GCS_BUCKET}/${VERSION_PATH}/"

          echo "🔗 Setting public read access..."
          gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${VERSION_PATH}/${ISO_NAME}" || true
          gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${VERSION_PATH}/SHA256SUMS.txt" || true

          echo "🪄 Updating 'latest' folder..."
          gsutil -m cp -n "$ISO_FILE" "$SHA_FILE" "gs://${GCS_BUCKET}/${LATEST_PATH}/"
          gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${LATEST_PATH}/${ISO_NAME}" || true
          gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${LATEST_PATH}/SHA256SUMS.txt" || true

          echo "🧾 Writing latest.json..."
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "edition": "${EDITION}",
            "release_name": "${OS_NAME} ${OS_FLAVOR} (${EDITION})",
            "tagline": "${TAGLINE}",
            "brand": "${OS_NAME}",
            "build_date": "${DATE}",
            "iso_name": "${ISO_NAME}",
            "sha256": "${SHA256}",
            "download_url": "https://storage.googleapis.com/${GCS_BUCKET}/${LATEST_PATH}/${ISO_NAME}",
            "checksum_url": "https://storage.googleapis.com/${GCS_BUCKET}/${LATEST_PATH}/SHA256SUMS.txt"
          }
          EOF
          gsutil cp latest.json "gs://${GCS_BUCKET}/${LATEST_PATH}/"
          gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${LATEST_PATH}/latest.json" || true

          echo "✅ Upload complete. Public URLs ready."

      # ---------------------------------------------------
      - name: 📦 Upload ISO Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Solvionyx-Aurora-${{ matrix.edition }}-${{ env.VERSION }}
          path: |
            solvionyx_build/*.iso.xz
            solvionyx_build/SHA256SUMS.txt

      # ---------------------------------------------------
      - name: 🚀 Publish GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "Aurora-${{ matrix.edition }}-${{ env.VERSION }}"
          name: "Solvionyx OS — Aurora (${{ matrix.edition }}) ${{ env.VERSION }}"
          body: |
            ## 🌌 Solvionyx OS — Aurora (${{ matrix.edition }})
            *${{ env.TAGLINE }}*

            ✅ Bootable ISO (EFI + Kernel Verified)
            ✅ Uploaded to Google Cloud Storage
            ✅ Public Download:
            https://storage.googleapis.com/${{ env.GCS_BUCKET }}/aurora/latest/${{ matrix.edition }}/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
