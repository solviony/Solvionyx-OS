name: Build & Release Solvionyx OS — Aurora (GNOME/XFCE/KDE)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: 🌌 Solvionyx OS — Aurora (${{ matrix.edition }})
    runs-on: ubuntu-24.04
    timeout-minutes: 160

    strategy:
      matrix:
        edition: [gnome, xfce, kde]
      fail-fast: false

    env:
      OS_NAME: "Solvionyx OS"
      OS_FLAVOR: "Aurora"
      TAGLINE: "The Engine Behind the Vision."
      GCS_BUCKET: solvionyx-os
      GCP_PROJECT: iconic-biplane-476304-u8
      VERSION: v${{ github.run_number }}

      SOLVIONYX_LOGO_PATH: branding/4023.png
      SOLVIONYX_BG_PATH: branding/4022.jpg
      BUILD_DIR: solvionyx_build
      CHROOT_DIR: solvionyx_build/chroot
      ISO_DIR: solvionyx_build

    steps:
    # ---------------------------------------------------
    - name: 🧩 Checkout repository
      uses: actions/checkout@v4

    # ---------------------------------------------------
    # ♻️ Restore build cache (chroot, branding, etc.)
    # Cache key changes when build_iso_debian.sh changes
    - name: ♻️ Restore Solvionyx build cache
      uses: actions/cache@v4
      with:
        path: |
          solvionyx_build
        key: solvionyx-${{ matrix.edition }}-${{ hashFiles('build_iso_debian.sh') }}
        restore-keys: |
          solvionyx-${{ matrix.edition }}-

    # ---------------------------------------------------
    - name: ⚙️ Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          debootstrap grub-pc-bin grub-efi-amd64-bin grub-common \
          syslinux isolinux syslinux-utils mtools xorriso squashfs-tools \
          rsync systemd-container genisoimage dosfstools xz-utils jq curl unzip \
          plymouth plymouth-themes plymouth-label imagemagick qemu-utils

    # ---------------------------------------------------
    - name: 🔐 Authenticate with Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCS_CREDENTIALS_JSON }}

    - name: ☁️ Install gcloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.GCP_PROJECT }}
        install_components: 'gsutil'

    - name: 🔎 Verify GCS Access
      run: |
        gsutil ls "gs://${GCS_BUCKET}" || (echo "❌ Cannot access bucket!" && exit 1)
        echo "✅ GCS bucket is reachable."

    # ---------------------------------------------------
    - name: 🎨 Ensure branding assets (with integrity check)
      run: |
        mkdir -p branding
        if ! identify "${SOLVIONYX_LOGO_PATH}" >/dev/null 2>&1; then
          echo "⚠️ Logo missing or corrupt — generating fallback."
          convert -size 512x128 xc:'#0b1220' -gravity center \
            -fill '#6f3bff' -pointsize 36 -annotate 0 'SOLVIONYX' "${SOLVIONYX_LOGO_PATH}"
        fi

        if ! identify "${SOLVIONYX_BG_PATH}" >/dev/null 2>&1; then
          echo "⚠️ Background missing or corrupt — generating fallback gradient."
          convert -size 1920x1080 gradient:"#00040A"-"#00172F" \
            "${SOLVIONYX_BG_PATH}"
        fi

        echo "✅ Branding ready."

    # ---------------------------------------------------
    - name: 💿 Build Solvionyx OS ISO (${{ matrix.edition }})
      run: |
        chmod +x build_iso_debian.sh
        export OS_NAME OS_FLAVOR TAGLINE SOLVIONYX_LOGO_PATH SOLVIONYX_BG_PATH
        ./build_iso_debian.sh "${{ matrix.edition }}"

    # ---------------------------------------------------
    - name: 🔍 List build outputs
      run: |
        echo "📂 Build directory:"
        ls -R solvionyx_build || true

    # ---------------------------------------------------
    - name: 🗜️ Compress ISO
      run: |
        cd "${ISO_DIR}"
        RAW=$(ls *.iso | head -n 1)
        echo "🗜️ Compressing $RAW..."
        xz -T0 -9e "$RAW"

    # ---------------------------------------------------
    - name: 🔐 Generate SHA256 Checksums
      run: |
        cd "${ISO_DIR}"
        sha256sum *.iso.xz > SHA256SUMS.txt
        cat SHA256SUMS.txt

    # ---------------------------------------------------
    - name: ☁️ Upload ISO + VM images to GCS (versioned + latest)
      env:
        EDITION: ${{ matrix.edition }}
      run: |
        ISO_FILE=$(ls ${ISO_DIR}/*.iso.xz | head -n 1)
        SHA_FILE="${ISO_DIR}/SHA256SUMS.txt"
        ISO_NAME=$(basename "$ISO_FILE")
        VERSION_PATH="aurora/${VERSION}/${EDITION}"
        LATEST_PATH="aurora/latest/${EDITION}"
        DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        SHA256=$(sha256sum "$ISO_FILE" | awk '{print $1}')

        echo "📤 Uploading ISO and checksum (versioned path)..."
        gsutil -m cp "$ISO_FILE" "$SHA_FILE" "gs://${GCS_BUCKET}/${VERSION_PATH}/"

        # Upload VM images if they exist
        if ls ${ISO_DIR}/vm_images/* 1>/dev/null 2>&1; then
          echo "📤 Uploading VM images (qcow2/vmdk/vdi)..."
          gsutil -m cp ${ISO_DIR}/vm_images/* "gs://${GCS_BUCKET}/${VERSION_PATH}/"
        fi

        echo "🔗 Making versioned files public..."
        gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${VERSION_PATH}/${ISO_NAME}" || true
        gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${VERSION_PATH}/SHA256SUMS.txt" || true
        if ls ${ISO_DIR}/vm_images/* 1>/dev/null 2>&1; then
          for f in $(ls ${ISO_DIR}/vm_images/*); do
            BN=$(basename "$f")
            gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${VERSION_PATH}/${BN}" || true
          done
        fi

        echo "🪄 Updating 'latest' folder..."
        gsutil -m cp "$ISO_FILE" "$SHA_FILE" "gs://${GCS_BUCKET}/${LATEST_PATH}/"
        if ls ${ISO_DIR}/vm_images/* 1>/dev/null 2>&1; then
          gsutil -m cp ${ISO_DIR}/vm_images/* "gs://${GCS_BUCKET}/${LATEST_PATH}/"
        fi

        echo "🔗 Making 'latest' files public..."
        gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${LATEST_PATH}/${ISO_NAME}" || true
        gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${LATEST_PATH}/SHA256SUMS.txt" || true
        if ls ${ISO_DIR}/vm_images/* 1>/dev/null 2>&1; then
          for f in $(ls ${ISO_DIR}/vm_images/*); do
            BN=$(basename "$f")
            gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${LATEST_PATH}/${BN}" || true
          done
        fi

        echo "🧾 Writing latest.json..."
        cat > latest.json <<EOF
{
  "version": "${VERSION}",
  "edition": "${EDITION}",
  "release_name": "${OS_NAME} ${OS_FLAVOR} (${EDITION})",
  "tagline": "${TAGLINE}",
  "brand": "${OS_NAME}",
  "build_date": "${DATE}",
  "iso_name": "${ISO_NAME}",
  "sha256": "${SHA256}",
  "download_url": "https://storage.googleapis.com/${GCS_BUCKET}/${LATEST_PATH}/${ISO_NAME}",
  "checksum_url": "https://storage.googleapis.com/${GCS_BUCKET}/${LATEST_PATH}/SHA256SUMS.txt"
}
EOF

        gsutil cp latest.json "gs://${GCS_BUCKET}/${LATEST_PATH}/"
        gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${LATEST_PATH}/latest.json" || true

        echo "✅ Upload complete."

    # ---------------------------------------------------
    - name: 📦 Upload ISO + VM image artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Solvionyx-Aurora-${{ matrix.edition }}-${{ env.VERSION }}
        path: |
          solvionyx_build/*.iso.xz
          solvionyx_build/SHA256SUMS.txt
          solvionyx_build/vm_images/*

    # ---------------------------------------------------
    - name: 🚀 Publish GitHub Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "Aurora-${{ matrix.edition }}-${{ env.VERSION }}"
        name: "Solvionyx OS — Aurora (${{ matrix.edition }}) ${{ env.VERSION }}"
        body: |
          ## 🌌 Solvionyx OS — Aurora (${{ matrix.edition }})
          *${{ env.TAGLINE }}*

          ✅ Hybrid ISO (EFI + BIOS)
          ✅ VM images (qcow2 / vmdk / vdi)
          ✅ Auto-uploaded to Google Cloud Storage

          🔗 Latest folder:
          https://storage.googleapis.com/${{ env.GCS_BUCKET }}/aurora/latest/${{ matrix.edition }}/
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
