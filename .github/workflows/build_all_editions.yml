name: Build & Release Solvionyx OS — Aurora (GNOME/XFCE/KDE)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: 🧠 Solvionyx OS — Aurora (${{ matrix.edition }})
    runs-on: ubuntu-24.04
    timeout-minutes: 150

    strategy:
      matrix:
        edition: [gnome, xfce, kde]
      fail-fast: false

    env:
      GCS_BUCKET: solvionyx-os
      GCP_PROJECT: iconic-biplane-476304-u8
      VERSION: v${{ github.run_number }}
      ISO_DIR: solvionyx_build
      BRAND_LOGO: branding/4023.png
      BRAND_BG: branding/4022.jpg

    steps:
      # ---------------------------------------------------
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      - name: ⚙️ Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap grub-pc-bin grub-efi-amd64-bin grub-common \
            syslinux isolinux syslinux-utils mtools xorriso squashfs-tools \
            rsync systemd-container genisoimage dosfstools xz-utils jq curl unzip \
            plymouth plymouth-themes plymouth-label imagemagick

      # ---------------------------------------------------
      - name: 🔐 Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_CREDENTIALS_JSON }}

      - name: ☁️ Install gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}
          install_components: 'gsutil'

      - name: 🔎 Verify GCS Access
        run: |
          gsutil ls "gs://${GCS_BUCKET}" || (echo "❌ Cannot access bucket!" && exit 1)
          echo "✅ GCS bucket is reachable."

      # ---------------------------------------------------
      - name: 🎨 Ensure branding assets
        run: |
          mkdir -p branding
          if [ ! -f "${BRAND_LOGO}" ]; then
            echo "⚠️ ${BRAND_LOGO} missing — creating fallback logo..."
            convert -size 512x128 xc:'#0b1220' -gravity center \
              -fill '#6f3bff' -pointsize 36 -annotate 0 'SOLVIONYX' "${BRAND_LOGO}"
          fi
          if [ ! -f "${BRAND_BG}" ]; then
            echo "ℹ️ ${BRAND_BG} missing — will rely on dark gradient fallback."
          fi

      # ---------------------------------------------------
      - name: 💿 Build Solvionyx OS ISO (${{ matrix.edition }})
        run: |
          chmod +x build_iso_debian.sh
          export SOLVIONYX_LOGO_PATH="${BRAND_LOGO}"
          export SOLVIONYX_BG_PATH="${BRAND_BG}"
          ./build_iso_debian.sh "${{ matrix.edition }}"

      # ---------------------------------------------------
      - name: ✨ Inject GTK “Welcome to Solvionyx OS” App
        run: |
          echo "🚀 Adding post-install Welcome to Solvionyx OS app..."

          CHROOT_DIR="solvionyx_build/chroot"
          sudo install -d -m 755 "$CHROOT_DIR/usr/share/solvionyx-welcome"
          sudo install -d -m 755 "$CHROOT_DIR/usr/share/applications"
          sudo install -d -m 755 "$CHROOT_DIR/etc/xdg/autostart"

          sudo tee "$CHROOT_DIR/usr/share/solvionyx-welcome/welcome.py" >/dev/null <<'EOF'
          #!/usr/bin/env python3
          import gi, subprocess, webbrowser, os
          gi.require_version("Gtk", "3.0")
          from gi.repository import Gtk

          class Welcome(Gtk.Window):
              def __init__(self):
                  super().__init__(title="Welcome to Solvionyx OS")
                  self.set_default_size(900, 600)
                  self.set_border_width(24)
                  box = Gtk.Box(orientation=Gtk.Orientation.VERTICAL, spacing=18)
                  self.add(box)

                  title = Gtk.Label()
                  title.set_markup("<span font='22' weight='bold'>🌌 Welcome to Solvionyx OS — Aurora</span>")
                  subtitle = Gtk.Label(label="The Engine Behind the Vision.\nLet's get you started.")
                  subtitle.set_justify(Gtk.Justification.CENTER)

                  b1 = Gtk.Button(label="💽 Install Solvionyx OS")
                  b2 = Gtk.Button(label="🧠 Try Live Environment")
                  b3 = Gtk.Button(label="🌐 Learn More")

                  b1.connect("clicked", self.install)
                  b2.connect("clicked", lambda _w: self.destroy())
                  b3.connect("clicked", lambda _w: webbrowser.open("https://solviony.com/page/os"))

                  box.pack_start(title, False, False, 10)
                  box.pack_start(subtitle, False, False, 10)

                  row = Gtk.Box(orientation=Gtk.Orientation.HORIZONTAL, spacing=10)
                  for b in (b1, b2, b3):
                      row.pack_start(b, True, True, 0)
                  box.pack_end(row, False, False, 15)

              def install(self, _w):
                  for c in ("calamares","ubiquity"):
                      if subprocess.call(["which", c], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL) == 0:
                          subprocess.Popen(["sudo", c]); break
                  self.destroy()

          if __name__ == "__main__":
              win = Welcome()
              win.connect("destroy", Gtk.main_quit)
              win.show_all()
              Gtk.main()
          EOF

          sudo chmod +x "$CHROOT_DIR/usr/share/solvionyx-welcome/welcome.py"

          sudo tee "$CHROOT_DIR/usr/share/applications/solvionyx-welcome.desktop" >/dev/null <<'EOF'
          [Desktop Entry]
          Name=Welcome to Solvionyx OS
          Exec=/usr/share/solvionyx-welcome/welcome.py
          Type=Application
          Terminal=false
          Icon=dialog-information
          Comment=First-launch Welcome App for Solvionyx OS
          Categories=Utility;System;
          EOF

          sudo cp "$CHROOT_DIR/usr/share/applications/solvionyx-welcome.desktop" \
                  "$CHROOT_DIR/etc/xdg/autostart/solvionyx-welcome.desktop"

          echo "✅ GTK Welcome App successfully injected."

      # ---------------------------------------------------
      - name: 🗜️ Compress ISO
        run: |
          cd "${ISO_DIR}"
          RAW_ISO=$(ls *.iso 2>/dev/null | head -n 1 || true)
          if [ -n "$RAW_ISO" ] && [ ! -f "${RAW_ISO}.xz" ]; then
            echo "🗜️ Compressing $RAW_ISO..."
            xz -T2 -5 "${RAW_ISO}"
          fi

      # ---------------------------------------------------
      - name: 🔐 Generate SHA256 Checksums
        run: |
          cd "${ISO_DIR}"
          sha256sum *.iso.xz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # ---------------------------------------------------
      - name: ☁️ Upload to Google Cloud Storage (Auto-Public)
        env:
          EDITION: ${{ matrix.edition }}
        run: |
          ISO_FILE=$(ls ${ISO_DIR}/*.iso.xz | head -n 1)
          SHA_FILE="${ISO_DIR}/SHA256SUMS.txt"
          ISO_NAME=$(basename "$ISO_FILE")
          VERSION_PATH="aurora/${VERSION}/${EDITION}"
          LATEST_PATH="aurora/latest/${EDITION}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHA256=$(sha256sum "$ISO_FILE" | awk '{print $1}')

          echo "📤 Uploading ISO and checksum..."
          gsutil -m cp -n "$ISO_FILE" "$SHA_FILE" "gs://${GCS_BUCKET}/${VERSION_PATH}/"

          echo "🔗 Setting public read access..."
          gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${VERSION_PATH}/${ISO_NAME}" || true
          gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${VERSION_PATH}/SHA256SUMS.txt" || true

          echo "🪄 Updating 'latest' folder..."
          gsutil -m cp -n "$ISO_FILE" "$SHA_FILE" "gs://${GCS_BUCKET}/${LATEST_PATH}/"
          gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${LATEST_PATH}/${ISO_NAME}" || true
          gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${LATEST_PATH}/SHA256SUMS.txt" || true

          echo "🧾 Writing latest.json..."
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "edition": "${EDITION}",
            "release_name": "Solvionyx OS Aurora (${EDITION})",
            "tagline": "The Engine Behind the Vision.",
            "brand": "Solvionyx OS",
            "build_date": "${DATE}",
            "iso_name": "${ISO_NAME}",
            "sha256": "${SHA256}",
            "download_url": "https://storage.googleapis.com/${GCS_BUCKET}/${LATEST_PATH}/${ISO_NAME}",
            "checksum_url": "https://storage.googleapis.com/${GCS_BUCKET}/${LATEST_PATH}/SHA256SUMS.txt"
          }
          EOF
          gsutil cp latest.json "gs://${GCS_BUCKET}/${LATEST_PATH}/"
          gsutil acl ch -u AllUsers:R "gs://${GCS_BUCKET}/${LATEST_PATH}/latest.json" || true

          echo "✅ Upload complete. Public URLs ready."

      # ---------------------------------------------------
      - name: 📦 Upload ISO Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Solvionyx-Aurora-${{ matrix.edition }}-${{ env.VERSION }}
          path: |
            solvionyx_build/*.iso.xz
            solvionyx_build/SHA256SUMS.txt

      # ---------------------------------------------------
      - name: 🚀 Publish GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "Aurora-${{ matrix.edition }}-${{ env.VERSION }}"
          name: "Solvionyx OS — Aurora (${{ matrix.edition }}) ${{ env.VERSION }}"
          body: |
            ## 🌌 Solvionyx OS — Aurora (${{ matrix.edition }})
            *The Engine Behind the Vision.*

            ✅ Bootable ISO (EFI + Kernel Verified)
            ✅ Uploaded to Google Cloud Storage
            ✅ Public Download:
            https://storage.googleapis.com/${{ env.GCS_BUCKET }}/aurora/latest/${{ matrix.edition }}/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
